<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poller+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poller One', sans-serif;
        }

        .card-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            min-height: 60px;
        }

        .movie-card img {
            object-fit: cover;
            height: auto;
            width: 100%;
            border-top-right-radius: 10px;
            border-top-left-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .movie-card {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .movie-card .card-body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-card .btn {
            align-self: center;
            margin-top: auto;
        }

        .pagination {
            justify-content: center;
            margin-top: 20px;
        }

        .search-bar {
            position: relative;
        }

        .search-bar i {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: gray;
        }

        .search-bar input {
            padding-left: 30px;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .col-md-6 {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index/index.html">
                <img src="./logo-white.png" alt="Logo" width="100" style="padding: 15px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index/index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cartelera.html">Cartelera</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="precios.html">Precios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>
                    <li class="nav-item" id="userNav">
                        <a class="nav-link" href="../user/user.html">
                            <i class="bi bi-person-circle"></i>
                            Mi usuario
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-dark text-white text-center py-5">
        <div class="container">
            <h1 class="display-4">Cartelera</h1>
            <p class="lead">Descubre todas las películas disponibles en nuestras salas</p>
        </div>
    </div>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="search-bar position-relative">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchByName" class="form-control" placeholder="Buscar por nombre...">
                </div>
            </div>
            <div class="col-md-6">
                <select id="searchByGenre" class="form-select">
                    <option value="">Buscar por género...</option>
                    <option value="Acción">Acción</option>
                    <option value="Comedia">Comedia</option>
                    <option value="Drama">Drama</option>
                    <option value="Terror">Terror</option>
                    <option value="Ciencia Ficción">Ciencia Ficción</option>
                </select>
            </div>
        </div>

        <div id="messageContainer" class="message"></div>

        <div class="row" id="movieGrid">
            <!-- Películas generadas dinámicamente -->
        </div>

        <nav>
            <ul class="pagination" id="pagination">
                <!-- Botones generados dinámicamente -->
            </ul>
        </nav>
    </div>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2024 Muelmo Cines. Todos los derechos reservados.</p>
            <ul class="list-unstyled d-flex justify-content-center">
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-facebook"></i> Facebook</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-twitter"></i> Twitter</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-instagram"></i> Instagram</a></li>
            </ul>
        </div>
    </footer>

    <script src="./cartelera.js"></script>
    <script src="../main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
