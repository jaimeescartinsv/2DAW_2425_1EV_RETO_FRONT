<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muelmo Cines</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poller+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poller One', sans-serif;
        }

        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            display: inline-block;
            width: 30px;
            height: 30px;
            background-size: contain;
            filter: invert(1);
            cursor: pointer;
        }

        .carousel-control-prev-icon:hover,
        .carousel-control-next-icon:hover {
            transform: scale(1.1);
        }

        .carousel-controls {
            text-align: center;
            margin-top: 20px;
        }

        .carousel-inner .row {
            padding: 0 15px;
        }

        .card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            width: 100%;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            height: 100%;
            width: 100%;
        }

        .card-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            min-height: 60px;
        }

        .card-text {
            flex-grow: 1;
            margin-bottom: 1rem;
        }

        .card p {
            margin-bottom: 1rem;
        }

        .card-body .btn {
            align-self: center;
            margin-top: auto;
            width: 100%;
        }

        @media (max-width: 768px) {
            .carousel-inner .row {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .carousel-inner .col-md-4 {
                max-width: 100%;
                flex: 0 0 100%;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index/index.html">
                <img src="./logo-white.png" alt="Logo" width="100" style="padding: 15px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Cartelera</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Precios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contacto</a>
                    </li>
                    <li class="nav-item" id="userNav">
                        <a class="nav-link" href="../user/user.html">
                            <i class="bi bi-person-circle"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="bg-dark text-white text-center py-5">
        <div class="container">
            <h1 class="display-4">Bienvenido a Muelmo Cines</h1>
            <p class="lead">Las mejores películas al mejor precio</p>
            <a href="#" class="btn btn-primary btn-lg">Ver Cartelera</a>
        </div>
    </div>

    <div id="featuredMoviesCarousel" class="carousel slide py-5" data-bs-ride="carousel">
        <div class="container">
            <h2 class="text-center mb-4">Películas Destacadas</h2>
            <div class="carousel-inner" id="carouselContent">
                <!-- Contenido generado dinámicamente -->
            </div>
            <div class="carousel-controls">
                <span class="carousel-control-prev-icon" data-bs-target="#featuredMoviesCarousel" data-bs-slide="prev"
                    role="button" aria-hidden="true"></span>
                <span class="carousel-control-next-icon ms-3" data-bs-target="#featuredMoviesCarousel"
                    data-bs-slide="next" role="button" aria-hidden="true"></span>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2024 Muelmo Cines. Todos los derechos reservados.</p>
            <ul class="list-unstyled d-flex justify-content-center">
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-facebook"></i> Facebook</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-twitter"></i> Twitter</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-instagram"></i> Instagram</a></li>
            </ul>
        </div>
    </footer>

    <script src="./main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
