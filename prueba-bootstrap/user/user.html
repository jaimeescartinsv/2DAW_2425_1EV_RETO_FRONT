<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario o Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poller+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poller One', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .form-container {
            max-width: 700px;
            padding: 30px;
            background-color: #343a40;
            color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .form-container h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #ffffff;
        }

        .form-container .form-label,
        .form-container .form-text {
            color: #f8f9fa;
        }

        .form-container .form-text a {
            color: #0d6efd;
            text-decoration: none;
        }

        .form-container .form-text a:hover {
            text-decoration: underline;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        footer {
            margin-top: auto;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index/index.html">
                <img src="./logo-white.png" alt="Logo" width="100" style="padding: 15px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index/index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cartelera.html">Cartelera</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="precios.html">Precios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contacto.html">Contacto</a>
                    </li>
                    <li class="nav-item" id="userNav">
                        <a class="nav-link active" href="../user/user.html">
                            <i class="bi bi-person-circle"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="content">
        <div class="container">
            <div class="form-container mx-auto">
                <h2>Crear Cuenta</h2>
                <form id="createUserForm">
                    <div class="mb-3">
                        <label for="createUsername" class="form-label">Nombre de Usuario</label>
                        <input type="text" class="form-control" id="createUsername"
                            placeholder="Ingrese su nombre de usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="createEmail" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="createEmail"
                            placeholder="Ingrese su correo electrónico" required>
                    </div>
                    <div class="mb-3">
                        <label for="createPassword" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="createPassword"
                            placeholder="Ingrese su contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                </form>

                <p class="form-text">¿Ya tienes una cuenta? <a href="#" id="switchToLogin">Inicia sesión</a></p>
            </div>

            <div class="form-container mx-auto" id="loginFormContainer" style="display: none;">
                <h2>Iniciar Sesión</h2>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label">Nombre de Usuario o Correo</label>
                        <input type="text" class="form-control" id="loginUsername"
                            placeholder="Ingrese su usuario o correo" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="loginPassword"
                            placeholder="Ingrese su contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                </form>

                <p class="form-text">¿No tienes una cuenta? <a href="#" id="switchToRegister">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2024 Muelmo Cines. Todos los derechos reservados.</p>
            <ul class="list-unstyled d-flex justify-content-center">
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-facebook"></i> Facebook</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-twitter"></i> Twitter</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-instagram"></i> Instagram</a></li>
            </ul>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const createUserForm = document.getElementById('createUserForm');
            const loginFormContainer = document.getElementById('loginFormContainer');
            const switchToLogin = document.getElementById('switchToLogin');
            const switchToRegister = document.getElementById('switchToRegister');

            switchToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                createUserForm.parentElement.style.display = 'none';
                loginFormContainer.style.display = 'block';
            });

            switchToRegister.addEventListener('click', (e) => {
                e.preventDefault();
                loginFormContainer.style.display = 'none';
                createUserForm.parentElement.style.display = 'block';
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('.navbar-toggler');
            const userNav = document.getElementById('userNav');

            toggleButton.addEventListener('click', () => {
                const isExpanded = toggleButton.getAttribute('aria-expanded') === 'true';

                if (isExpanded) {
                    userNav.innerHTML = `
                <a class="nav-link" href="./user.html">
                    Mi usuario
                </a>
            `;
                } else {
                    userNav.innerHTML = `
                <a class="nav-link" href="./user.html">
                    <i class="bi bi-person-circle"></i>
                </a>
            `;
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
