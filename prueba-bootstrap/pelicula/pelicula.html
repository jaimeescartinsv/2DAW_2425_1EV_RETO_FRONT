<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Película</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poller+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poller One', sans-serif;
        }

        .movie-banner img {
            object-fit: cover;
            height: 300px;
        }

        .movie-poster img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .movie-details h1 {
            font-size: 2.5rem;
        }

        .movie-details p {
            font-size: 1.2rem;
        }

        .btn-purchase {
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .btn-back {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="../index/index.html">
                <img src="./logo-white.png" alt="Logo" width="100" style="padding: 15px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Cartelera</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Precios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contacto</a>
                    </li>
                    <li class="nav-item" id="userNav">
                        <a class="nav-link" href="../user/user.html">
                            <i class="bi bi-person-circle"></i>
                            Mi usuario
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="movie-banner">
        <img src="https://via.placeholder.com/1920x600" alt="Cartel de la película" class="img-fluid w-100" id="movieBanner">
    </div>

    <div class="container py-5">
        <div class="row align-items-center">
            <div class="col-md-4 movie-poster">
                <img src="https://via.placeholder.com/500x750" alt="Poster de la Película" id="moviePoster">
            </div>
            <div class="col-md-8 movie-details">
                <h1 id="movieTitle">Título de la Película</h1>
                <p><strong>Director:</strong> <span id="movieDirector"></span></p>
                <p><strong>Duración:</strong> <span id="movieDuration"></span></p>
                <p><strong>Género:</strong> <span id="movieGenre"></span></p>
                <p><strong>Clasificación:</strong> <span id="movieRating"></span></p>
                <p><strong>Sinopsis:</strong></p>
                <p id="movieDescription">
                    
                </p>
                <button class="btn btn-primary btn-lg btn-purchase" id="btnPurchaseTickets">Comprar Entradas</button>
                <button class="btn btn-secondary btn-lg btn-back" id="btnBack">Volver al listado</button>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2024 Muelmo Cines. Todos los derechos reservados.</p>
            <ul class="list-unstyled d-flex justify-content-center">
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-facebook"></i> Facebook</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-twitter"></i> Twitter</a></li>
                <li class="ms-3"><a class="text-white" href="#"><i class="bi bi-instagram"></i> Instagram</a></li>
            </ul>
        </div>
    </footer>

    <script src="../main.js"></script>
    <script src="./pelicula.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
